name: "Check commits for typos"
on: [push]

jobs:
  summarize:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
      - name: Run Copilot Chat
        run: |
          gh copilot -p "Examine changes in the last commit on this branch. Report on problems with functional correctness, code style, efficiency. Also check that the commit message sufficiently describes the code changes, including the motivation for the changes when appropriate." --allow-all-tools
